server {
    listen 80;
    server_name 62.171.180.22;

    # Frontend (Next.js) — long timeouts for /api/backtest which can take 2-5min
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Backtests can take several minutes — extend default 60s timeouts.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;

        # Disable response buffering so streamed keepalive bytes flow through.
        proxy_buffering off;
    }

    # Python API direct access (debug only)
    location /api/py/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
