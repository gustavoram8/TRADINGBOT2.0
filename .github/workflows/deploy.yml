name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/tradingbot

            # Pull latest changes (always match remote exactly)
            git fetch origin main
            git reset --hard origin/main

            # Install new frontend dependencies if any
            npm install --production=false

            # Rebuild frontend
            npm run build

            # Apply nginx config (idempotent — overwrites every deploy so the
            # VPS always matches what's in the repo, no manual edits possible).
            cp deploy/nginx-tradingbot.conf /etc/nginx/sites-available/tradingbot
            # Remove any stale duplicate configs that conflict on the same server_name
            rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/.default.swp
            ln -sf /etc/nginx/sites-available/tradingbot /etc/nginx/sites-enabled/tradingbot
            nginx -t
            systemctl reload nginx

            # Restart frontend
            pm2 restart tradingbot-frontend

            # Restart Python backend
            systemctl restart tradingbot

            echo "Deploy completed successfully"
