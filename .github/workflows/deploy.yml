name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/tradingbot

            # Pull latest changes (always match remote exactly)
            git fetch origin main
            git reset --hard origin/main

            # Install new frontend dependencies if any
            npm install --production=false

            # Rebuild frontend
            npm run build

            # ─── nginx config (idempotent) ────────────────────────────────
            echo "=== nginx: applying config ==="
            cp deploy/nginx-tradingbot.conf /etc/nginx/sites-available/tradingbot
            # Remove all stale enabled configs and re-link only ours
            rm -f /etc/nginx/sites-enabled/default \
                  /etc/nginx/sites-enabled/.default.swp \
                  /etc/nginx/sites-enabled/tradingbot
            ln -s /etc/nginx/sites-available/tradingbot /etc/nginx/sites-enabled/tradingbot
            echo "=== nginx: sites-enabled ==="
            ls -la /etc/nginx/sites-enabled/
            echo "=== nginx: validating ==="
            nginx -t
            echo "=== nginx: reloading ==="
            systemctl reload nginx
            echo "=== nginx: active timeouts (proxy_*_timeout) ==="
            nginx -T 2>/dev/null | grep -i 'proxy_.*_timeout' || echo "(no proxy timeouts found)"
            # ──────────────────────────────────────────────────────────────

            # Restart frontend — start fresh if PM2 process doesn't exist yet
            if pm2 describe tradingbot-frontend > /dev/null 2>&1; then
              pm2 restart tradingbot-frontend --update-env
            else
              pm2 start npm --name tradingbot-frontend -- start
              pm2 save
            fi

            # Restart Python backend
            systemctl restart tradingbot

            echo "Deploy completed successfully"
